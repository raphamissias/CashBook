<main>
  <div class="form-wrap">
    <form [formGroup]="contributorsForm">
      <app-primary-input formControlName="name" label="Nome" />
      <app-primary-input formControlName="phoneNumber" label="Telefone" />
      <app-primary-input formControlName="isActive" label="Contribuinte ativo?" type="checkbox" />
    </form>
    <button class="primary-btn" (click)="submit()">Salvar contribuinte</button>
  </div>
  <app-data-grid-view
    class="dtg-section"
    columnOneName="Nome"
    columnTwoName="Telefone"
    columnThreeName="Está ativo?"
    columnOneDataName="name"
    columnTwoDataName="phoneNumber"
    columnThreeDataName="isActive"
    [dataResponse]="contributorsList"
  ></app-data-grid-view>
</main>
