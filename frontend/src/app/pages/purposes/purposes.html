<main>
  <div class="form-wrap">
    <form [formGroup]="purposesForm">
      <app-primary-input formControlName="name" label="Nome" />
      <app-primary-input formControlName="isActive" label="Propósito ativo?" type="checkbox" />
    </form>
    <button class="primary-btn" (click)="submit()">Salvar propósito</button>
  </div>
  <app-data-grid-view
    class="dtg-section"
    [columnOneName]="'Nome'"
    [columnTwoName]="'Propósito'"
    [columnOneDataName]="'name'"
    [columnTwoDataName]="'isActive'"
    [dataResponse]="purposesList"
  ></app-data-grid-view>
</main>
