<div class="dtg">
  <button class="primary-btn" (click)="refreshData()">Refresh</button>
  <div class="dtg-header">
    <span class="column-1">{{ columnOneName }}</span>
    <span class="column-2">{{ columnTwoName }}</span>
    <span class="column-3">{{ columnThreeName }}</span>
  </div>
  <ul class="dtg-items">
    @for (item of loadedData; track $index) {
      <li class="dtg-item">
        <div class="column-1">{{ item[columnOneDataName] }}</div>
        <div class="column-2">{{ item[columnTwoDataName] }}</div>
        <div class="column-3">{{ item[columnThreeDataName] }}</div>
      </li>
    } @empty {
      <li class="dtg-item">No items found.</li>
    }
  </ul>
</div>
